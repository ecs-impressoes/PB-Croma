<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PB-CROMA PRO - Editor de Fotos 28x19cm | Corte 27x18cm</title>
    <meta name="description" content="Editor profissional de fotos para impressão com sangria 28x19cm e linha de corte 27x18cm. Upload de até 200 fotos. Suporte HEIC, JPG, PNG, WEBP.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: #e2e8f0; min-height: 100vh; }
       .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
       .logo-container { display: flex; align-items: center; gap: 15px; }
       .logo { width: 60px; height: 60px; background: linear-gradient(135deg, #3a0ca3, #4361ee, #4cc9f0); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; }
       .logo-text h1 { font-size: 2rem; background: linear-gradient(to right, #4cc9f0, #4361ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
       .header-info { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
       .header-info.badge { background: rgba(76, 201, 240, 0.15); border: 1px solid rgba(76, 201, 240, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; color: #4cc9f0; }
       .header-info.badge.cut { border-color: rgba(239, 68, 68, 0.3); color: #f87171; }
       .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 1024px) {.main-grid { grid-template-columns: 1fr; } }
       .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
       .card h2 { color: #4cc9f0; margin-bottom: 15px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
       .upload-area { border: 2px dashed #475569; border-radius: 12px; padding: 30px 20px; text-align: center; cursor: pointer; background: rgba(15, 23, 42, 0.5); margin-bottom: 15px; }
       .upload-area.drag-over { border-color: #4cc9f0; background: rgba(76, 201, 240, 0.1); }
       .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
       .btn-primary { background: linear-gradient(135deg, #3a0ca3, #4361ee); color: white; }
       .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
       .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
       .hidden { display: none!important; }
       .photo-counter { background: linear-gradient(135deg, #3a0ca3, #4361ee); color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
       .photo-list { max-height: 200px; overflow-y: auto; margin: 10px 0; }
       .photo-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #334155; gap: 10px; }
       .photo-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
       .photo-info { flex: 1; min-width: 0; }
       .photo-name { font-weight: 600; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
       .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 8px 0; display: none; }
       .progress-bar.progress-fill { height: 100%; background: linear-gradient(90deg, #3a0ca3, #4cc9f0); width: 0%; }
       .progress-bar.active { display: block; }
       .a4-page-container { background: #1a1a2e; padding: 20px; border-radius: 12px; display: flex; justify-content: center; min-height: 500px; }
       .a4-page { background: white; width: 100%; max-width: 500px; aspect-ratio: 28 / 19; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden; }
       .photo-grid { width: 100%; height: 100%; padding: 5px; }
       .photo-slot { width: 100%; height: 100%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
       .photo-slot img { width: 100%; height: 100%; object-fit: contain; }
       .cut-marks { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
       .cut-marks.cut-line { position: absolute; border: 1px solid #ef4444; top: 5%; left: 5%; right: 5%; bottom: 5%; opacity: 0.7; }
       .status-bar { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding: 12px 15px; background: rgba(15, 23, 42, 0.5); border-radius: 8px; }
       .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; color: white; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 1000; }
       .toast.show { transform: translateY(0); opacity: 1; }
       .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
       .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo">PB</div>
                <div class="logo-text"><h1>PB-CROMA PRO</h1><p>Editor 28x19cm Sulfite | Corte 27x18cm</p></div>
            </div>
            <div class="header-info">
                <span class="badge"><i class="fas fa-crop-alt"></i> 28×19 cm</span>
                <span class="badge cut"><i class="fas fa-cut"></i> Corte 27×18 cm</span>
                <span class="badge"><i class="fas fa-images"></i> 200 Fotos</span>
            </div>
        </header>
        <div class="main-grid">
            <div class="card">
                <h2><i class="fas fa-upload"></i> Importar Fotos<span class="photo-counter" id="photoCounter">0 / 200</span></h2>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt" style="font-size:36px;color:#4cc9f0"></i>
                    <p><strong>Arraste e solte suas fotos aqui</strong></p>
                    <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
                    <button class="btn btn-primary" id="browseBtn">Selecionar Fotos</button>
                </div>
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="photo-list" id="photoList"><p style="text-align:center;color:#64748b;padding:15px;">Nenhuma foto selecionada</p></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><button class="btn btn-danger" id="clearBtn">Limpar</button><button class="btn btn-success" id="processBtn" disabled>Processar</button></div>
            </div>
            <div class="card">
                <div style="display:flex;justify-content:space-between;margin-bottom:15px;">
                    <h2 style="margin:0;"><i class="fas fa-eye"></i> Pré-visualização - 28x19cm</h2>
                    <div><button id="prevPageBtn">◀</button><span id="pageIndicator">Página 1 de 1</span><button id="nextPageBtn">▶</button></div>
                </div>
                <div class="a4-page-container">
                    <div class="a4-page" id="a4Page">
                        <div class="photo-grid"><div class="photo-slot" id="photoSlot"><div style="text-align:center;color:#94a3b8;"><i class="fas fa-image" style="font-size:2.5rem;display:block;margin-bottom:8px;"></i>Adicione uma foto - 28x19cm</div></div></div>
                        <div class="cut-marks" id="cutMarks"><div class="cut-line"></div></div>
                    </div>
                </div>
                <div class="status-bar">
                    <div><span><strong id="totalPhotos">0</strong> fotos</span> | <span><strong id="totalPages">0</strong> páginas</span> | <strong>28×19 cm</strong> | Corte: <strong>27×18 cm</strong></div>
                    <button class="btn btn-primary" id="downloadBtn" disabled>Baixar PDF 28x19</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        // CÓDIGO CORRIGIDO PARA 28x19CM SULFITE
        document.addEventListener('DOMContentLoaded', function() {
            const state = { photos: [], currentPage: 0, totalPages: 0, maxPhotos: 200, photoWidth: 280, photoHeight: 190, cutWidth: 270, cutHeight: 180, totalSize: 0, formats: new Set() };
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const browseBtn = document.getElementById('browseBtn');
            const photoList = document.getElementById('photoList');
            const photoSlot = document.getElementById('photoSlot');
            const processBtn = document.getElementById('processBtn');
            const clearBtn = document.getElementById('clearBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');
            const pageIndicator = document.getElementById('pageIndicator');
            const photoCounter = document.getElementById('photoCounter');
            const totalPhotos = document.getElementById('totalPhotos');
            const totalPagesEl = document.getElementById('totalPages');
            const toast = document.getElementById('toast');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const cutMarks = document.getElementById('cutMarks');

            function showToast(m,t='info'){ toast.textContent=m; toast.className='toast '+t+' show'; setTimeout(()=>toast.classList.remove('show'),3000); }
            function formatFileSize(b){ if(b===0) return '0'; const k=1024,s=['B','KB','MB'],i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+s[i]; }
            function isImageFile(f){ return f.type.startsWith('image/') || /\.(jpe?g|png|webp|heic|heif|bmp|gif|tiff?)$/i.test(f.name); }

            function updateCounters(){
                photoCounter.textContent = `${state.photos.length} / ${state.maxPhotos}`;
                totalPhotos.textContent = state.photos.length;
                totalPagesEl.textContent = state.totalPages;
                processBtn.disabled = state.photos.length===0;
                downloadBtn.disabled = state.totalPages===0;
            }

            function renderList(){
                if(state.photos.length===0){ photoList.innerHTML='<p style="text-align:center;color:#64748b;padding:15px;">Nenhuma foto</p>'; return; }
                photoList.innerHTML='';
                state.photos.forEach((p,i)=>{
                    const d=document.createElement('div'); d.className='photo-item';
                    d.innerHTML=`<img src="${p.url}" class="photo-thumb"><div class="photo-info"><div class="photo-name">${p.name}</div><div style="font-size:0.7rem;color:#94a3b8;">${formatFileSize(p.size)}</div></div><button onclick="window.removePhoto(${i})">X</button>`;
                    photoList.appendChild(d);
                });
            }

            function renderPreview(){
                if(state.photos.length===0){ photoSlot.innerHTML='<div style="text-align:center;color:#94a3b8;">Adicione uma foto</div>'; return; }
                const photo = state.photos[state.currentPage];
                if(photo){ photoSlot.innerHTML=`<img src="${photo.url}" style="width:100%;height:100%;object-fit:contain;transform:rotate(${photo.rotation||0}deg)">`; cutMarks.style.display='block'; }
                pageIndicator.textContent=`Página ${state.currentPage+1} de ${state.totalPages}`;
            }

            async function addPhotos(files){
                files = Array.from(files).slice(0, state.maxPhotos - state.photos.length);
                let count=0;
                progressBar.classList.add('active');
                for(let i=0;i<files.length;i++){
                    const file=files[i];
                    if(!isImageFile(file)) continue;
                    const url = await new Promise(res=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(file); });
                    state.photos.push({ name:file.name, size:file.size, url:url, rotation:0 });
                    count++;
                    progressFill.style.width=((i+1)/files.length*100)+'%';
                    renderList(); updateCounters();
                }
                progressBar.classList.remove('active');
                showToast(`${count} fotos adicionadas - 28x19cm`,'success');
            }

            window.removePhoto=(i)=>{ state.photos.splice(i,1); renderList(); updateCounters(); renderPreview(); };

            function processPhotos(){
                state.totalPages = state.photos.length;
                state.currentPage=0;
                renderPreview(); updateCounters();
                downloadBtn.disabled=false;
                showToast(`${state.photos.length} fotos processadas em 28x19cm!`,'success');
            }

            async function generatePDF(){
                if(state.photos.length===0) return;
                downloadBtn.disabled=true; downloadBtn.textContent='Gerando...';
                try{
                    const { jsPDF } = window.jspdf;
                    // *** CORREÇÃO PRINCIPAL: PDF NO TAMANHO EXATO 28x19CM ***
                    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [280, 190] });
                    for(let p=0;p<state.photos.length;p++){
                        if(p>0) doc.addPage([280, 190], 'landscape');
                        const photo=state.photos[p];
                        // FOTO OCUPA 100% DA FOLHA 28x19
                        doc.addImage(photo.url, 'JPEG', 0, 0, 280, 190);
                        // Linha de corte 27x18
                        doc.setDrawColor(255,0,0); doc.setLineWidth(0.3);
                        doc.rect(5, 5, 270, 180);
                        // Marcas de corte
                        doc.setDrawColor(0); doc.setLineWidth(0.2);
                        doc.line(0,5,5,5); doc.line(5,0,5,5);
                        doc.line(275,0,275,5); doc.line(280,5,275,5);
                        doc.line(0,185,5,185); doc.line(5,190,5,185);
                        doc.line(275,185,275,190); doc.line(275,185,280,185);
                    }
                    doc.save('fotos-28x19cm-sulfite-corte-27x18cm.pdf');
                    showToast('PDF 28x19cm gerado!','success');
                }catch(e){ showToast('Erro: '+e.message,'error'); }
                finally{ downloadBtn.disabled=false; downloadBtn.textContent='Baixar PDF 28x19'; }
            }

            browseBtn.addEventListener('click',()=>fileInput.click());
            fileInput.addEventListener('change',e=>{ addPhotos(e.target.files); e.target.value=''; });
            uploadArea.addEventListener('dragover',e=>{ e.preventDefault(); uploadArea.classList.add('drag-over'); });
            uploadArea.addEventListener('drop',e=>{ e.preventDefault(); addPhotos(e.dataTransfer.files); });
            uploadArea.addEventListener('click',()=>fileInput.click());
            processBtn.addEventListener('click',processPhotos);
            clearBtn.addEventListener('click',()=>{ state.photos=[]; state.totalPages=0; renderList(); updateCounters(); renderPreview(); });
            downloadBtn.addEventListener('click',generatePDF);
            prevPageBtn.addEventListener('click',()=>{ if(state.currentPage>0){ state.currentPage--; renderPreview(); } });
            nextPageBtn.addEventListener('click',()=>{ if(state.currentPage<state.totalPages-1){ state.currentPage++; renderPreview(); } });
        });
    </script>
</body>
</html>
